name: Build and Deploy

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: ec2-backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release

      # ✅ HARD VALIDATION (prevents your previous "0 byte binary" disaster)
      - name: Validate binary
        run: |
          ls -lah target/release/
          test -s target/release/realestate
          file target/release/realestate

      # ✅ Normalize artifact (removes path ambiguity)
      - name: Prepare deploy artifact
        run: |
          cp target/release/realestate realestate
          chmod +x realestate

      # 🚀 Upload ONLY final binary
      - name: Upload binary to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 68.183.127.248
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "realestate"
          target: "/root/app/releases/"

      # 🚀 Activate release (safe atomic switch)
      - name: Activate release
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 68.183.127.248
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            APP_NAME="realestate"
            NEW="/root/app/releases/${APP_NAME}_${GITHUB_SHA}"

            # move uploaded binary into versioned folder
            mkdir -p "$NEW"
            mv /root/app/releases/realestate "$NEW/$APP_NAME"
            chmod +x "$NEW/$APP_NAME"

            # save previous release for rollback
            if [ -L /root/app/current ]; then
              PREV=$(readlink /root/app/current)
              ln -sfn "$PREV" /root/app/previous || true
            fi

            # switch to new release
            ln -sfn "$NEW/$APP_NAME" /root/app/current

            # restart service
            systemctl restart myapp
            sleep 3

            # health check gate (CRITICAL)
            if curl -fs http://127.0.0.1:3000/health > /dev/null; then
              echo "✅ deploy successful"
              exit 0
            else
              echo "❌ health check failed — rolling back"

              if [ -L /root/app/previous ]; then
                ln -sfn "$(readlink /root/app/previous)" /root/app/current
                systemctl restart myapp
              fi

              exit 1
            fi