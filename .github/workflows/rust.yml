name: Build and Deploy

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: ec2-backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release

      # ✅ HARD VALIDATION (prevents your previous "0 byte binary" disaster)
      - name: Validate binary
        run: |
          ls -lah target/release/
          test -s target/release/realestate
          file target/release/realestate

      # ✅ Normalize artifact (removes path ambiguity)
      - name: Prepare deploy artifact
        run: |
          cp target/release/realestate realestate
          chmod +x realestate

      # 🚀 Upload ONLY final binary
      - name: Upload binary to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 68.183.127.248
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "realestate"
          target: "/root/app/releases/"

      # 🚀 Activate release (safe atomic switch)
      - name: Activate release
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 68.183.127.248
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            NEW="/root/app/releases/realestate_${GITHUB_SHA}"

            mv /root/app/releases/realestate "$NEW"

            ln -sfn "$NEW" /root/app/current

            chmod +x "$NEW"

            systemctl restart myapp
            sleep 2
            systemctl --no-pager status myapp