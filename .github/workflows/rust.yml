  name: Build and Deploy

  on:
    push:
      branches: [master]

  env:
    APP_NAME: realestate
    APP_ROOT: /root/app

  jobs:
    deploy:
      runs-on: ubuntu-latest
      environment:
        name: ec2-backend

      steps:
        - name: Checkout
          uses: actions/checkout@v4

        - name: Install Rust
          uses: dtolnay/rust-toolchain@stable

        - name: Build release binary
          run: cargo build --release

        - name: Run tests
          run: cargo test

        - name: Validate binary
          run: |
            ls -lah target/release/
            test -s target/release/${APP_NAME}
            file target/release/${APP_NAME}

        - name: Prepare deploy artifact
          run: |
            cp target/release/${APP_NAME} ${APP_NAME}
            chmod +x ${APP_NAME}

        - name: Prepare remote directories
          uses: appleboy/ssh-action@v1.0.3
          with:
            host: 68.183.127.248
            username: root
            key: ${{ secrets.SSH_PRIVATE_KEY }}
            script: |
              set -eu
              APP_ROOT="${{ env.APP_ROOT }}"
              mkdir -p "${APP_ROOT}/releases"

        - name: Upload binary to server
          uses: appleboy/scp-action@v0.1.7
          with:
            host: 68.183.127.248
            username: root
            key: ${{ secrets.SSH_PRIVATE_KEY }}
            source: "${{ env.APP_NAME }}"
            target: "${{ env.APP_ROOT }}/releases/"
            overwrite: true

        - name: Activate release
          uses: appleboy/ssh-action@v1.0.3
          with:
            host: 68.183.127.248
            username: root
            key: ${{ secrets.SSH_PRIVATE_KEY }}
            envs: GITHUB_SHA
            script: |
              set -e

              APP_NAME="${{ env.APP_NAME }}"
              APP_ROOT="${{ env.APP_ROOT }}"
              NEW="${APP_ROOT}/releases/${APP_NAME}_${GITHUB_SHA}"

              echo "Deploying commit: $GITHUB_SHA"

              # fail fast if SHA missing
              if [ -z "$GITHUB_SHA" ]; then
                echo "❌ GITHUB_SHA is empty"
                exit 1
              fi

              mkdir -p "$NEW"

              mv ${APP_ROOT}/releases/${APP_NAME} "$NEW/$APP_NAME"
              chmod +x "$NEW/$APP_NAME"

              # save previous release
              if [ -L ${APP_ROOT}/current ]; then
                PREV=$(readlink ${APP_ROOT}/current)
                ln -sfn "$PREV" ${APP_ROOT}/previous || true
              fi

              # switch to new release
              ln -sfn "$NEW/$APP_NAME" ${APP_ROOT}/current

              # restart service
              systemctl restart myapp
              sleep 3

              # health check gate
              if curl -fs http://127.0.0.1:3000/health > /dev/null; then
                echo "✅ deploy successful"
                exit 0
              else
                echo "❌ health check failed — rolling back"

                if [ -L ${APP_ROOT}/previous ]; then
                  ln -sfn "$(readlink ${APP_ROOT}/previous)" ${APP_ROOT}/current
                  systemctl restart myapp
                fi

                exit 1
              fi